<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Эрудит — Автомобили</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
<div class="quiz-container">
    <h1>🚗 Автомобили</h1>

    <div id="optionsList" class="options-list"></div>
    <div class="input-area">
        <input type="number" id="answerInput" min="1" max="4" placeholder="Номер (1-4)">
        <button id="submitAnswerBtn">Ответить</button>
    </div>
    <div id="resultMessage" class="hidden"></div>
    <button id="nextBtn">Следующий вопрос</button>
</div>
<script src="quiz5.js"></script>

</html>
